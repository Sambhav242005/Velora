project_name: sambhav-100m-sft-structured-outputs
seed: 1337
out_dir: out/sft_100m_structured_outputs

data:
  data_dir: data/sft/structured_outputs_1024
  tokenizer_path: tokenizer_fineweb_16k/tokenizer.json

model:
  vocab_size: auto
  n_layer: 30
  n_embd: 512
  n_head: 8
  n_kv_head: 2
  block_size: 2048
  dropout: 0.0
  bias: false
  use_gradient_checkpointing: true
  attention_mode: hybrid
  hybrid_attention_pattern: full,sliding,csa,hca,sliding,csa,hca,full
  sliding_window: 512
  csa_block_size: 64
  csa_local_window: 512
  hca_block_size: 256
  hca_local_window: 512
  rope_theta: 10000.0

sft:
  base_checkpoint: out/sft_100m_alpaca_polish/best.pt
  max_steps: 1200

train:
  dtype: bf16
  learning_rate: 0.000005
  min_lr: 0.000001
  weight_decay: 0.0
  beta1: 0.9
  beta2: 0.95
  warmup_steps: 60
  grad_clip: 1.0
  target_tokens_per_update: 32768
  log_interval: 10
  eval_interval_steps: 50
  save_interval_steps: 150

batch:
  auto_find: true
  auto_find_on_resume: true
  start_micro_batch: 1
  max_micro_batch: 48
  max_vram_fraction: 0.90

checkpoint:
  resume: auto
  save_atomic: true
  save_on_interrupt: true
  save_on_exception: true

eval:
  iters: 50
  batch_size: 4
