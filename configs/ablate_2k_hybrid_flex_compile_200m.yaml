project_name: ablate-2k-hybrid-flex-compile-200m
seed: 1337
out_dir: out/ablate_2k_hybrid_flex_compile_200m

data:
  data_dir: data/fineweb_processed_16k_150m
  tokenizer_path: tokenizer_fineweb_16k/tokenizer.json
  num_workers: 0

model:
  vocab_size: auto
  n_layer: 24
  n_embd: 512
  n_head: 8
  n_kv_head: 2
  block_size: 2048
  dropout: 0.0
  bias: false
  use_gradient_checkpointing: false
  attention_mode: hybrid
  hybrid_attention_pattern: full,sliding,csa,hca,sliding,csa,hca,full
  sliding_window: 512
  csa_block_size: 64
  csa_local_window: 512
  hca_block_size: 256
  hca_local_window: 512
  rope_theta: 10000.0
  use_flex_attention: true

train:
  base_checkpoint: out/runpod_sambhav_80m_v2_hybrid_1b/final.pt
  max_tokens: 200_000_000
  dtype: bf16
  compile: true
  learning_rate: 0.0002
  min_lr: 0.00002
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  warmup_steps: 200
  grad_clip: 1.0
  target_tokens_per_update: 131072
  log_interval: 20
  eval_every_tokens: 10_000_000
  save_every_tokens: 50_000_000
  save_every_minutes: 20

batch:
  auto_find: true
  start_micro_batch: 1
  max_micro_batch: 28
  reduce_on_oom: true
  increase_if_safe: true
  increase_every_steps: 200
  max_vram_fraction: 0.90

checkpoint:
  resume: auto
  keep_last_n: 2
  save_atomic: true
  save_on_interrupt: true
  save_on_exception: true

eval:
  iters: 20
  batch_size: 4
