project_name: sambhav-80m-local-fineweb-small
seed: 1337
out_dir: out/local_fineweb_80m_small

data:
  data_dir: data/fineweb_processed
  tokenizer_path: tokenizer/tokenizer.json
  num_workers: 0

model:
  vocab_size: auto
  n_layer: 16
  n_embd: 512
  n_head: 8
  n_kv_head: 4
  block_size: 1024
  dropout: 0.0
  bias: false
  use_gradient_checkpointing: true

train:
  max_tokens: 20_000_000
  dtype: bf16
  compile: false
  learning_rate: 0.0004
  min_lr: 0.00004
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  warmup_steps: 500
  grad_clip: 1.0
  target_tokens_per_update: 65536
  log_interval: 10
  eval_every_tokens: 1_000_000
  save_every_tokens: 2_000_000
  save_every_minutes: 15

batch:
  auto_find: true
  start_micro_batch: 1
  max_micro_batch: 32
  reduce_on_oom: true
  increase_if_safe: true
  increase_every_steps: 100
  max_vram_fraction: 0.88

checkpoint:
  resume: auto
  keep_last_n: 3
  save_atomic: true
  save_on_interrupt: true
  save_on_exception: true

eval:
  iters: 30
  batch_size: 4
