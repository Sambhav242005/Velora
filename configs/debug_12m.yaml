project_name: sambhav-debug-12m
seed: 1337
out_dir: out/debug_12m

data:
  train_bin: data/processed/train.bin
  val_bin: data/processed/val.bin
  meta: data/processed/meta.json
  num_workers: 0

model:
  vocab_size: auto
  n_layer: 8
  n_embd: 256
  n_head: 8
  n_kv_head: 4
  block_size: 256
  dropout: 0.0
  bias: false
  use_gradient_checkpointing: false

train:
  max_tokens: 1000000
  dtype: bf16
  compile: false
  learning_rate: 0.0006
  min_lr: 0.00006
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  warmup_steps: 20
  grad_clip: 1.0
  target_tokens_per_update: 8192
  log_interval: 5
  eval_interval_tokens: 100000
  save_interval_tokens: 250000
  save_interval_minutes: 5

batch:
  auto_find: true
  start_micro_batch: 1
  max_micro_batch: 32
  reduce_on_oom: true
  increase_if_safe: false
  increase_every_steps: 100
  max_vram_fraction: 0.90

checkpoint:
  resume: auto
  keep_last_n: 3
  save_atomic: true
  save_on_interrupt: true
  save_on_exception: true

eval:
  iters: 10
  batch_size: 4
