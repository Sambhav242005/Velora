project_name: velora-sft-alpaca-v2
seed: 1337
out_dir: out/sft_alpaca_runpod_v2

data:
  data_dir: data/sft/alpaca_cleaned_512
  tokenizer_path: tokenizer_fineweb_16k/tokenizer.json

model:
  vocab_size: auto
  n_layer: 24
  n_embd: 512
  n_head: 8
  n_kv_head: 2
  block_size: 2048
  dropout: 0.0
  bias: false
  use_gradient_checkpointing: true
  attention_mode: hybrid
  hybrid_attention_pattern: full,sliding,csa,hca
  sliding_window: 512
  csa_block_size: 64
  csa_local_window: 512
  hca_block_size: 256
  hca_local_window: 512

sft:
  base_checkpoint: out/runpod_sambhav_80m_v2_hybrid_1b/final.pt
  max_steps: 1200

train:
  dtype: bf16
  learning_rate: 0.00003
  min_lr: 0.000003
  weight_decay: 0.0
  beta1: 0.9
  beta2: 0.95
  warmup_steps: 50
  grad_clip: 1.0
  target_tokens_per_update: 32768
  log_interval: 10
  eval_interval_steps: 50
  save_interval_steps: 100

batch:
  auto_find: true
  auto_find_on_resume: true
  start_micro_batch: 1
  max_vram_gb: 24.0
  max_micro_batch: 64

checkpoint:
  resume: auto
  save_atomic: true
  save_on_interrupt: true
  save_on_exception: true

eval:
  iters: 50
  batch_size: 4
