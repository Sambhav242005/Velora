project_name: sambhav-80m-v2-hybrid
seed: 1337
out_dir: out/sambhav_80m_v2_hybrid

data:
  data_dir: data/fineweb_processed_16k_150m
  tokenizer_path: tokenizer_fineweb_16k/tokenizer.json
  num_workers: 0

model:
  vocab_size: auto
  n_layer: 24
  n_embd: 512
  n_head: 8
  n_kv_head: 2
  block_size: 2048
  dropout: 0.0
  bias: false
  use_gradient_checkpointing: true
  attention_mode: hybrid
  hybrid_attention_pattern: full,sliding,csa,hca
  sliding_window: 512
  csa_block_size: 64
  csa_local_window: 512
  hca_block_size: 256
  hca_local_window: 512

train:
  max_tokens: 150_000_000
  dtype: bf16
  compile: false
  learning_rate: 0.0002
  min_lr: 0.00002
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  warmup_steps: 500
  grad_clip: 1.0
  target_tokens_per_update: 32768
  log_interval: 10
  eval_every_tokens: 2_000_000
  save_every_tokens: 2_000_000
  save_every_minutes: 15

batch:
  auto_find: true
  start_micro_batch: 1
  max_vram_gb: 10.0
  max_micro_batch: 32
  reduce_on_oom: true
  increase_if_safe: true
  increase_every_steps: 100
  max_vram_fraction: 0.88

checkpoint:
  resume: auto
  keep_last_n: 3
  save_atomic: true
  save_on_interrupt: true
  save_on_exception: true

eval:
  iters: 50
  batch_size: 2
