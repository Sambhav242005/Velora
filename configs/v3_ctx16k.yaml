project_name: v3-ctx16k
seed: 1337
out_dir: out/v3_ctx16k

data:
  data_dir: data/lm/pg19_16k
  tokenizer_path: tokenizer_fineweb_16k/tokenizer.json
  num_workers: 0

model:
  vocab_size: auto
  n_layer: 24
  n_embd: 512
  n_head: 8
  n_kv_head: 2
  block_size: 16384
  dropout: 0.0
  bias: false
  use_gradient_checkpointing: true
  attention_mode: hybrid
  hybrid_attention_pattern: full,sliding,csa,hca
  sliding_window: 2048
  csa_block_size: 256
  csa_local_window: 2048
  hca_block_size: 1024
  hca_local_window: 2048
  rope_theta: 500000.0

train:
  base_checkpoint: out/v3_cpt_web_2k/final.pt
  max_tokens: 500_000_000
  dtype: bf16
  compile: false
  learning_rate: 0.00005
  min_lr: 0.000005
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  warmup_steps: 200
  grad_clip: 1.0
  target_tokens_per_update: 131072
  log_interval: 10
  eval_every_tokens: 20_000_000
  save_every_tokens: 50_000_000
  save_every_minutes: 20

batch:
  auto_find: true
  auto_find_on_resume: true
  start_micro_batch: 1
  max_micro_batch: 8
  reduce_on_oom: true
  increase_if_safe: false
  max_vram_fraction: 0.90

checkpoint:
  resume: auto
  keep_last_n: 2
  save_atomic: true
  save_on_interrupt: true
  save_on_exception: true

eval:
  iters: 10
  batch_size: 1
