project_name: sambhav-80m-local-fineweb-tiny-16k
seed: 1337
out_dir: out/local_fineweb_80m_tiny_16k_80m

data:
  data_dir: data/fineweb_processed_16k
  tokenizer_path: tokenizer_fineweb_16k/tokenizer.json
  num_workers: 0

model:
  vocab_size: auto
  n_layer: 23
  n_embd: 512
  n_head: 8
  n_kv_head: 4
  block_size: 512
  dropout: 0.0
  bias: false
  use_gradient_checkpointing: true

train:
  # Optional: set max_steps to stop after optimizer steps instead of max_tokens.
  # max_steps: 10000
  max_tokens: 5_000_000
  dtype: bf16
  compile: false
  learning_rate: 0.0004
  min_lr: 0.00004
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  warmup_steps: 100
  grad_clip: 1.0
  target_tokens_per_update: 32768
  log_interval: 10
  eval_every_tokens: 500_000
  save_every_tokens: 1_000_000
  save_every_minutes: 15

batch:
  auto_find: true
  start_micro_batch: 1
  # Optional: cap peak reserved VRAM and let auto_find choose the largest safe micro-batch.
  # On a 12GB GPU, 10.0 leaves room for the desktop/driver.
  # max_vram_gb: 10.0
  max_micro_batch: 64
  reduce_on_oom: true
  increase_if_safe: true
  increase_every_steps: 100
  max_vram_fraction: 0.88

checkpoint:
  resume: auto
  keep_last_n: 3
  save_atomic: true
  save_on_interrupt: true
  save_on_exception: true

eval:
  iters: 20
  batch_size: 4
